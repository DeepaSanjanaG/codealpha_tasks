<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Signup — ShopAlpha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">Shop<span>Alpha</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <h2>Welcome Back 👋</h2>
        <p class="auth-sub">Login to your ShopAlpha account</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="john@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <div id="loginError" class="auth-error" style="display:none;"></div>
        <button class="btn" style="width:100%;" onclick="handleLogin()">Login</button>
        <p class="auth-switch">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" style="display:none;">
        <h2>Create Account 🚀</h2>
        <p class="auth-sub">Join ShopAlpha today</p>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="john@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Re-enter password" />
        </div>
        <div id="signupError" class="auth-error" style="display:none;"></div>
        <div id="signupSuccess" class="auth-success" style="display:none;"></div>
        <button class="btn" style="width:100%;" onclick="handleSignup()">Create Account</button>
        <p class="auth-switch">Already have an account? <a onclick="switchTab('login')">Login</a></p>
      </div>

    </div>
  </section>

  <footer><p>© 2024 ShopAlpha — CodeAlpha Internship Project</p></footer>

  <script src="script.js"></script>
  <script>
    updateCartCount();

    function switchTab(tab) {
      document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
      document.getElementById("signupForm").style.display = tab === "signup" ? "block" : "none";
      document.querySelectorAll(".tab-btn").forEach((btn, i) => {
        btn.classList.toggle("active", (tab === "login" && i === 0) || (tab === "signup" && i === 1));
      });
    }

    function handleSignup() {
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const confirm = document.getElementById("signupConfirm").value;
      const errorDiv = document.getElementById("signupError");
      const successDiv = document.getElementById("signupSuccess");

      errorDiv.style.display = "none";
      successDiv.style.display = "none";

      if (!name || !email || !password || !confirm) {
        errorDiv.textContent = "Please fill in all fields.";
        errorDiv.style.display = "block"; return;
      }
      if (password.length < 6) {
        errorDiv.textContent = "Password must be at least 6 characters.";
        errorDiv.style.display = "block"; return;
      }
      if (password !== confirm) {
        errorDiv.textContent = "Passwords do not match.";
        errorDiv.style.display = "block"; return;
      }

      // Check if email already exists
      const users = JSON.parse(localStorage.getItem("users")) || [];
      if (users.find(u => u.email === email)) {
        errorDiv.textContent = "Email already registered. Please login.";
        errorDiv.style.display = "block"; return;
      }

      // Save user
      users.push({ name, email, password });
      localStorage.setItem("users", JSON.stringify(users));

      successDiv.textContent = `Account created! Welcome, ${name}! Redirecting to login...`;
      successDiv.style.display = "block";

      setTimeout(() => switchTab("login"), 2000);
    }

    function handleLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const errorDiv = document.getElementById("loginError");

      errorDiv.style.display = "none";

      if (!email || !password) {
        errorDiv.textContent = "Please enter email and password.";
        errorDiv.style.display = "block"; return;
      }

      const users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        errorDiv.textContent = "Invalid email or password.";
        errorDiv.style.display = "block"; return;
      }

      // Save logged in user
      localStorage.setItem("loggedInUser", JSON.stringify(user));
      window.location.href = "index.html";
    }
  </script>
</body>
</html><!DOCTYPE html>
